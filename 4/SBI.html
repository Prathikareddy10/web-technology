<html>
    <body>
        <style>
            input[type=text]{
                width:100%;
                border:2px;
                background-color:aliceblue;
                padding:25px;
                margin:10px;
                font-size:20px;
            }
            input[type=number]{
                width:100%;
                border:2px;
                background-color:greenyellow;
                padding:25px;
                margin:10px;
                font-size:20px;
            }
            input[type=button]{
                border:2px;
                background-color:green;
                padding:15px;
                margin:10px;
                font-size:20px;
            }
            h3{
                text-align:center;
                color:aquamarine; 
            }
        </style>
        <h3>SBI BANK EMI CALCULATOR</h3>
        <form>
            Name <input type="text" placeholder="enter your name">
            Occupation <input type="text" placeholder="enter your occupation">
            Loan Amount <input type="number"  id="amount" placeholder="enter your loan amount">
            Intrest Rate <input type="number" id="ir" placeholder="enter intrest rate">
            Tenure in years <input type="number" id="tiy" placeholder="enter tenure in years">
            <input type="button" value="calculate EMI" onclick="calculate()">
        </form>
         <p id="result"></p>
        <script>
            function calculate(){
            var loan=Number(document.getElementById("amount").value);
            var intrest=Number(document.getElementById("ir").value);
            var tenure=Number(document.getElementById("tiy").value);
            var mir=(intrest/12)/100;
            var months=tenure*12;
            var emi=(loan*mir*Math.pow(1+mir,months))/(Math.pow(1+mir,months)-1);
            document.getElementById("result").innerText="The EMI is "+emi;
            }
        </script>
        
    </body>
</html>
